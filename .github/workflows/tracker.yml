name: BGL Price Tracker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install axios cheerio

      - name: Jalankan Scraper
        run: node scraper.js

      - name: Commit dan Push Data Terbaru
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Tambahkan file yang mau dicek
          git add data.json
          
          # Cek apakah ada data yang berubah
          if git diff --staged --quiet; then
            echo "Harga BGL belum berubah, bot tidak melakukan push."
          else
            git commit -m "update: harga BGL terbaru"
            git pull --rebase origin main
            git push
          fi
